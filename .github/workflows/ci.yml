name: CI process

on:
  push:
  pull_request:
    branches: [dev]
    types: [opened, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  run-container:
    runs-on: ubuntu-latest
    env:
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_DBNAME: ${{ secrets.DATABASE_DBNAME }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: 'latest'

      - name: Build and run services
        run: docker compose up db backend -d --build --wait --wait-timeout 60

      - name: Install goose
        run: docker exec backend go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Migration db
        run: docker exec backend sh ./src/scripts/migrations.test.sh --up

      - name: Check migrations
        run: docker exec backend sh ./src/scripts/migrations.test.sh --status

      - name: Testing
        run: docker exec backend go test -v -short ./src/...

      - name: Shutdown Docker Compose
        if: always()
        run: docker compose down -v --rmi all --remove-orphans

  sync:
    runs-on: ubuntu-latest
    needs: run-container
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Notion PR Sync
        uses: Slipum/sync-notion-pr@v1.3.2
        with:
          notion_token: ${{ secrets.NOTION_TOKEN }}
          notion_target_status: 'Review'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
