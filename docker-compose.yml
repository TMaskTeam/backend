services:
  db:
    container_name: postgres
    image: postgres:14.21-alpine
    ports:
      - '5432:5432'
    shm_size: 128mb
    restart: always
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_DBNAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_DBNAME}']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  backend:
    depends_on:
      db:
        condition: service_healthy
    container_name: backend
    build:
      context: .
    ports:
      - '8080:80'
    restart: always
    environment:
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_DBNAME=${DATABASE_DBNAME}
      - SERVER_PORT=80
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
    healthcheck:
      test:
        - CMD-SHELL
        - |
          wget --no-verbose --tries=1 --spider "http://127.0.0.1:80/ping" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./src/api/public:/app/src/api/public

  frontend:
    container_name: frontend
    build:
      context: ../frontend
      # args:
      # VITE_API_URL: https://backend.midray.ru
    expose:
      - '3000'
    restart: always

volumes:
  postgres_data:
